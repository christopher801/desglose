<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a2a38"/>
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="28" fill="url(#grad)"/>
  
  <!-- Window silhouette -->
  <rect x="20" y="22" width="60" height="56" rx="8" fill="none" stroke="#e9f0f5" stroke-width="2.8"/>
  
  <!-- Glass panel with soft light -->
  <rect x="24" y="26" width="52" height="48" rx="6" fill="#cbe4f0" fill-opacity="0.5"/>
  
  <!-- Simple cross -->
  <line x1="50" y1="26" x2="50" y2="74" stroke="#e9f0f5" stroke-width="2"/>
  <line x1="24" y1="50" x2="76" y2="50" stroke="#e9f0f5" stroke-width="2"/>
  
  <!-- Handle as a small dot -->
  <circle cx="50" cy="66" r="3" fill="#e9f0f5" fill-opacity="0.8"/>
  
  <!-- Top accent -->
  <rect x="42" y="15" width="16" height="4" rx="2" fill="#e9f0f5" fill-opacity="0.7"/>
</svg>